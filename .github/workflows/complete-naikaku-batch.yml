name: complete-naikaku-batch
on:
  workflow_dispatch:
    inputs:
      sets_key:
        description: sets list JSON key in R2
        default: "_worklist/med_gap_sets.json"
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        shard: [0,1,2,3,4,5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips42 libvips-tools
          pip install -q pyvips boto3 requests pillow opencc
      - name: clone priv
        env:
          P: ${{ secrets.P }}
        run: git clone --depth 1 --quiet https://x-access-token:${P}@github.com/hosonzuo8848/harvester-priv.git _p
      - name: batch gap-fill (targeted enum + download, sequential)
        env:
          EDGE_PROXY: https://naikaku-dl.hosonzuo.workers.dev/fetch?url=
          NAIKAKU_ZIP: https://naikaku-zip.hosonzuo.workers.dev
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_KEY: ${{ secrets.R2_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          CF_D1_DB: ${{ secrets.CF_D1_DB }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}
          LIST_BUCKET: ${{ secrets.LIST_BUCKET }}
          DST_BUCKET: guyaofang-lib
          DST_GUJI_BUCKET: guji-sea
          PAGE_WORKERS: "4"
          SETS_KEY: ${{ github.event.inputs.sets_key }}
          SHARD: ${{ matrix.shard }}
          TOTAL: "6"
        run: python _p/batch_gap.py
