name: harvest-naikaku
on:
  schedule:
    - cron: '0 */6 * * *'    # med_todo (医书)
    - cron: '30 */6 * * *'   # shibu (子部·错峰30分·concurrency串行避免16分片顶封)
  workflow_dispatch:
    inputs:
      total:
        description: "DEPRECATED·实际固定8(留兼容)"
        default: "8"
      list_key:
        description: worklist key in R2 (med_todo/shibu/full)
        default: "_worklist/med_todo.csv"
      edge_proxy:
        description: egress proxy (502 换IP用)
        default: "https://naikaku-dl.hosonzuo.workers.dev/fetch?url="
      force:
        description: "1=缺页整本重下覆盖(补残·跳过skip)"
        default: ""
concurrency:
  group: harvest-naikaku
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips42 libvips-tools
          pip install -q pyvips boto3 requests pillow opencc
      - name: run shard
        env:
          P: ${{ secrets.P }}
          EDGE_PROXY: ${{ github.event.inputs.edge_proxy || 'https://naikaku-dl.hosonzuo.workers.dev/fetch?url=' }}
          NAIKAKU_ZIP: https://naikaku-zip.hosonzuo.workers.dev,https://naikaku-mine.hosonzuo.workers.dev,https://naikaku-zip-2.hosonzuo.workers.dev,https://naikaku-zip-3.hosonzuo.workers.dev,https://naikaku-zip-4.hosonzuo.workers.dev,https://naikaku-zip-5.hosonzuo.workers.dev,https://naikaku-zip-6.hosonzuo.workers.dev,https://naikaku-zip-7.hosonzuo.workers.dev
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_KEY: ${{ secrets.R2_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          CF_D1_DB: ${{ secrets.CF_D1_DB }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}
          LIST_BUCKET: ${{ secrets.LIST_BUCKET }}
          LIST_KEY: ${{ github.event.inputs.list_key || (github.event.schedule == '30 */6 * * *' && '_worklist/shibu.csv' || '_worklist/med_todo.csv') }}
          DST_BUCKET: guyaofang-lib
          DST_GUJI_BUCKET: naikaku-dl
          PAGE_WORKERS: "10"
          FORCE: ${{ github.event.inputs.force }}
        run: python stub.py --source naikaku --shard ${{ matrix.shard }} --total 8
